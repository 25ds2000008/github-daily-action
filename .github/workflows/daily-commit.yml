name: Daily Commit Workflow

permissions:
  contents: write

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Step for 25ds200008@ds.study.iitm.ac.in
        run: echo "Workflow triggered for 25ds200008@ds.study.iitm.ac.in"

      - name: Create Daily Commit
        run: |
          echo "Last run: $(date)" >> daily-log.txt
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
